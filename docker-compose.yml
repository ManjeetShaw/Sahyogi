version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: civicai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: civicai-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/civicai
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: civicai-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data:
